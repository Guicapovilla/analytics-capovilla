name: Coletar YouTube Analytics

on:
  schedule:
    - cron: '0 10 * * *'  # 07h horário de Brasília (UTC-3)
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            requests \
            youtube-transcript-api

      - name: Salvar token.json do Secret
        run: |
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json
          cat token.json

      - name: Rodar coleta
        env:
          TOKEN_PERSONAL_GITHUB: ${{ secrets.TOKEN_PERSONAL_GITHUB }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
        run: python coletar.py

      - name: Se falhar, notificar
        if: failure()
        run: |
          echo "❌ Workflow falhou. Verifique o token.json ou execute manualmente."
