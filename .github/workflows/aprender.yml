name: Loop de Aprendizado

on:
  schedule:
    - cron: '0 12 * * 0'  # Domingo 09h Brasília (UTC-3)
  workflow_dispatch:

jobs:
  aprender:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install \
            google-auth \
            google-auth-oauthlib \
            google-auth-httplib2 \
            google-api-python-client \
            requests \
            youtube-transcript-api

      - name: Rodar loop de aprendizado
        env:
          TOKEN_PERSONAL_GITHUB: ${{ secrets.TOKEN_PERSONAL_GITHUB }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python aprender.py

        SUPADATA_API_KEY: ${{ sd_335edda2d03cbf5a1ee5d16de25ff5d4 }}
